<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gestione Menù — Fratelli Caruso</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700&display=swap');
:root{--nero:#111008;--oro:#c8922a;--oro-v:#e8b96a;--carta:#faf6ee;--sabbia:#f0e8d8;--grigio:#7a6f63;--bianco:#fff;--rosso:#b03a2e;--verde:#2d6a4f;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--carta);color:var(--nero);min-height:100vh;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--nero);padding:24px;}
.login-box{background:var(--carta);border-radius:20px;padding:36px 28px;width:100%;max-width:340px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.4);}
.login-box h1{font-family:'Playfair Display',serif;font-size:22px;color:var(--oro);margin-bottom:4px;}
.login-box p{font-size:12px;color:var(--grigio);margin-bottom:24px;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:24px;}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#d4c9bb;transition:background .15s;}
.pin-dot.pieno{background:var(--oro);}
.pin-tastiera{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.pin-tasto{padding:16px;background:var(--bianco);border:1.5px solid #d4c9bb;border-radius:12px;font-size:20px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .1s;}
.pin-tasto:hover{background:var(--sabbia);border-color:var(--oro);}
.pin-tasto:active{transform:scale(.94);}
.pin-tasto.oro{background:var(--oro);border-color:var(--oro);color:var(--nero);}
.topbar{background:var(--nero);color:var(--carta);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30;}
.topbar h1{font-family:'Playfair Display',serif;font-size:17px;color:var(--oro);flex:1;}
.topbar-btn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;}
.topbar-btn.anteprima{background:var(--oro);border-color:var(--oro);color:var(--nero);font-weight:600;}
.tabs{background:var(--nero);display:flex;border-top:1px solid rgba(255,255,255,.06);}
.tab-btn{flex:1;padding:12px 8px;background:none;border:none;color:rgba(255,255,255,.4);font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;font-family:'Inter',sans-serif;transition:all .15s;}
.tab-btn.attivo{color:var(--oro);border-bottom-color:var(--oro);}
.contenuto{max-width:700px;margin:0 auto;padding:20px 16px 80px;}
.drag-list{list-style:none;}
.drag-item{background:var(--bianco);border:1.5px solid #e8dfd0;border-radius:14px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px;transition:border-color .15s,box-shadow .15s,opacity .15s;}
.drag-item:hover{border-color:var(--oro);}
.drag-item.dragging{opacity:.4;box-shadow:0 4px 20px rgba(0,0,0,.15);}
.drag-item.drag-over{border-color:var(--oro);box-shadow:0 0 0 3px rgba(200,146,42,.2);}
.drag-handle{color:#c5bdb4;cursor:grab;font-size:18px;flex-shrink:0;padding:4px;touch-action:none;user-select:none;}
.drag-handle:active{cursor:grabbing;}
.prod-foto{width:52px;height:52px;border-radius:8px;flex-shrink:0;background:var(--sabbia);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;}
.prod-foto img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
.prod-info{flex:1;min-width:0;}
.prod-nome{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-meta{display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap;}
.prod-prezzo{font-size:12px;color:var(--oro);font-weight:700;}
.prod-prezzo-barrato{font-size:11px;color:#aaa;text-decoration:line-through;}
.badge-pill{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;}
.badge-novita{background:#e8f5e9;color:#2d6a4f;}
.badge-consigliato{background:#fff8e1;color:#b08000;}
.orario-tag{font-size:10px;color:var(--grigio);background:var(--sabbia);padding:1px 6px;border-radius:8px;}
.allergeni-tag{font-size:10px;color:#666;background:#f0f0f0;padding:1px 6px;border-radius:8px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-azioni{display:flex;gap:5px;flex-shrink:0;align-items:center;}
.toggle-disp{width:40px;height:22px;background:#d4c9bb;border-radius:11px;position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0;}
.toggle-disp::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:white;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle-disp.on{background:var(--verde);}
.toggle-disp.on::after{left:20px;}
.btn-ico{width:32px;height:32px;border-radius:8px;border:1.5px solid #e8dfd0;background:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.btn-ico:hover{background:var(--sabbia);border-color:var(--oro);}
.btn-ico.rosso:hover{background:#fef0ef;border-color:var(--rosso);}
.sez-cat{margin-bottom:6px;}
.sez-cat-header{display:flex;align-items:center;gap:8px;padding:14px 0 8px;border-bottom:1px solid #e8dfd0;margin-bottom:8px;}
.sez-cat-header h3{font-family:'Playfair Display',serif;font-size:16px;flex:1;}
.sez-cat-header .cat-count{font-size:11px;color:var(--grigio);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(17,16,8,.65);z-index:100;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--carta);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;box-shadow:0 -4px 40px rgba(0,0,0,.25);animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-box h3{font-family:'Playfair Display',serif;font-size:19px;margin-bottom:18px;}
.campo{margin-bottom:13px;}
.campo label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--grigio);margin-bottom:5px;}
.campo input,.campo textarea,.campo select{width:100%;padding:11px 13px;border:1.5px solid #d4c9bb;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;background:var(--bianco);color:var(--nero);outline:none;transition:border-color .15s;}
.campo input:focus,.campo textarea:focus,.campo select:focus{border-color:var(--oro);}
.campo textarea{resize:vertical;min-height:60px;}
.campo-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-primario{width:100%;padding:14px;background:var(--oro);color:var(--nero);border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:background .15s;}
.btn-primario:hover{background:var(--oro-v);}
.btn-annulla{width:100%;padding:12px;background:none;border:1.5px solid #d4c9bb;border-radius:12px;font-family:'Inter',sans-serif;font-size:14px;color:var(--grigio);cursor:pointer;margin-top:8px;}
.btn-elimina-modal{width:100%;padding:11px;background:none;border:1.5px solid var(--rosso);border-radius:12px;font-family:'Inter',sans-serif;font-size:14px;color:var(--rosso);cursor:pointer;margin-top:6px;}
.foto-area{border:2px dashed #d4c9bb;border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:border-color .15s;position:relative;margin-bottom:10px;}
.foto-area:hover,.foto-area.dragover{border-color:var(--oro);background:rgba(200,146,42,.04);}
.foto-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.foto-preview-img{width:100%;max-height:140px;object-fit:cover;border-radius:8px;margin-bottom:8px;display:none;}
.foto-area-testo{font-size:13px;color:var(--grigio);}
.foto-area-testo strong{color:var(--oro);}
.badge-select{display:flex;gap:8px;flex-wrap:wrap;}
.badge-opt{padding:6px 14px;border-radius:20px;border:1.5px solid #d4c9bb;background:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.badge-opt.sel-novita{background:#e8f5e9;border-color:#2d6a4f;color:#2d6a4f;}
.badge-opt.sel-consigliato{background:#fff8e1;border-color:#b08000;color:#b08000;}
.badge-opt.sel-none{background:var(--sabbia);border-color:#aaa;color:var(--grigio);}

/* ALLERGENI CHECKBOX */
.allergeni-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.all-check{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px solid #e8dfd0;border-radius:8px;cursor:pointer;transition:all .15s;background:var(--bianco);}
.all-check:hover{border-color:var(--oro);background:#fffdf8;}
.all-check.sel{border-color:var(--rosso);background:#fef5f5;}
.all-check input{width:16px;height:16px;accent-color:var(--rosso);cursor:pointer;flex-shrink:0;}
.all-check .all-nome{font-size:12px;font-weight:500;color:var(--nero);}
.all-check .all-sigla{font-size:10px;color:var(--grigio);margin-left:auto;}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--nero);color:var(--carta);padding:13px 22px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.35);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;max-width:300px;text-align:center;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.ok{border-top:3px solid var(--oro);}
#toast.err{border-top:3px solid var(--rosso);}
.btn-aggiungi{width:100%;padding:13px;background:none;border:1.5px dashed #c9963a;border-radius:12px;color:var(--oro);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:16px;transition:background .15s;}
.btn-aggiungi:hover{background:rgba(200,146,42,.06);}
.cat-admin-item{background:var(--bianco);border:1.5px solid #e8dfd0;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:grab;}
.cat-admin-item:hover{border-color:var(--oro);}
.cat-admin-item.dragging{opacity:.4;}
.cat-admin-item.drag-over{border-color:var(--oro);box-shadow:0 0 0 3px rgba(200,146,42,.2);}
#anteprima-overlay{display:none;position:fixed;inset:0;background:rgba(17,16,8,.8);z-index:200;align-items:center;justify-content:center;}
#anteprima-overlay.show{display:flex;}
#anteprima-frame{width:390px;height:85vh;border:none;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.btn-chiudi-anteprima{position:fixed;top:20px;right:20px;background:var(--bianco);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.empty{text-align:center;padding:30px;color:var(--grigio);font-size:13px;}
.upload-progress{height:4px;background:#e8dfd0;border-radius:2px;margin-top:8px;overflow:hidden;display:none;}
.upload-progress-bar{height:100%;background:var(--oro);border-radius:2px;width:0%;transition:width .3s;}
.sezione-titolo-modale{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--grigio);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid #e8dfd0;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>🫒 Gestione Menù</h1>
    <p>Inserisci il PIN gestore</p>
    <div class="pin-dots"><div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div><div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div></div>
    <div class="pin-tastiera">
      <button class="pin-tasto" onclick="pt('1')">1</button><button class="pin-tasto" onclick="pt('2')">2</button><button class="pin-tasto" onclick="pt('3')">3</button>
      <button class="pin-tasto" onclick="pt('4')">4</button><button class="pin-tasto" onclick="pt('5')">5</button><button class="pin-tasto" onclick="pt('6')">6</button>
      <button class="pin-tasto" onclick="pt('7')">7</button><button class="pin-tasto" onclick="pt('8')">8</button><button class="pin-tasto" onclick="pt('9')">9</button>
      <button class="pin-tasto" onclick="pcanc()" style="font-size:16px">⌫</button><button class="pin-tasto" onclick="pt('0')">0</button><button class="pin-tasto oro" onclick="pconf()">✓</button>
    </div>
    <div id="login-err" style="font-size:12px;color:var(--rosso);min-height:16px;text-align:center"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <h1>🫒 Gestione Menù</h1>
    <button class="topbar-btn anteprima" onclick="apriAnteprima()">👁 Anteprima</button>
    <button class="topbar-btn" onclick="logout()">Esci</button>
  </div>
  <div class="tabs">
    <button class="tab-btn attivo" onclick="mostraTab('prodotti')">🍽️ Prodotti</button>
    <button class="tab-btn" onclick="mostraTab('categorie')">📂 Categorie</button>
  </div>
  <div class="contenuto">
    <div id="tab-prodotti">
      <button class="btn-aggiungi" onclick="apriModaleProdotto()">+ Aggiungi prodotto</button>
      <div id="lista-prodotti"><div class="empty">Caricamento…</div></div>
    </div>
    <div id="tab-categorie" style="display:none">
      <button class="btn-aggiungi" onclick="apriModaleCategoria()">+ Aggiungi categoria</button>
      <div id="lista-categorie"><div class="empty">Caricamento…</div></div>
    </div>
  </div>
</div>

<!-- MODALE PRODOTTO -->
<div class="modal-overlay" id="modal-prodotto">
  <div class="modal-box">
    <h3 id="modal-prod-titolo">Nuovo prodotto</h3>
    <div class="campo"><label>Categoria</label><select id="prod-cat"></select></div>
    <div class="campo"><label>Nome prodotto</label><input type="text" id="prod-nome" placeholder="es. Panino con la Milza"></div>
    <div class="campo"><label>Descrizione</label><textarea id="prod-desc" placeholder="Ingredienti o breve descrizione…"></textarea></div>
    <div class="campo-row">
      <div class="campo"><label>Prezzo (€)</label><input type="number" id="prod-prezzo" placeholder="0.00" min="0" step="0.05"></div>
      <div class="campo"><label>Prezzo barrato (€)</label><input type="number" id="prod-prezzo-barrato" placeholder="Lascia vuoto" min="0" step="0.05"></div>
    </div>
    <div class="campo">
      <label>Badge</label>
      <div class="badge-select">
        <button type="button" class="badge-opt" id="badge-none" onclick="setBadge(null)">Nessuno</button>
        <button type="button" class="badge-opt" id="badge-novita" onclick="setBadge('novita')">🟢 Novità</button>
        <button type="button" class="badge-opt" id="badge-consigliato" onclick="setBadge('consigliato')">⭐ Consigliato</button>
      </div>
    </div>
    <div class="campo">
      <label>Visibile solo in questi orari <span style="color:#aaa;font-weight:400">(lascia vuoto = sempre)</span></label>
      <div class="campo-row">
        <div class="campo" style="margin:0"><label>Dalle</label><input type="time" id="prod-ora-inizio"></div>
        <div class="campo" style="margin:0"><label>Alle</label><input type="time" id="prod-ora-fine"></div>
      </div>
    </div>
    <div class="campo">
      <label>Foto prodotto</label>
      <div class="foto-area" id="foto-area" ondragover="fotagOver(event)" ondragleave="fotaLeave(event)" ondrop="fotaDrop(event)">
        <img id="foto-preview" class="foto-preview-img" src="" alt="">
        <input type="file" id="foto-input" accept="image/*" onchange="fotoScelto(event)">
        <div class="foto-area-testo" id="foto-testo">📷 <strong>Tocca per scegliere una foto</strong><br><span style="font-size:11px">JPG, PNG, WEBP · max 5MB</span></div>
        <div class="upload-progress" id="upload-progress"><div class="upload-progress-bar" id="upload-bar"></div></div>
      </div>
      <input type="text" id="prod-foto-url" placeholder="oppure incolla URL foto…" style="margin-top:4px">
    </div>

    <!-- NUOVA SEZIONE ALLERGENI -->
    <div class="sezione-titolo-modale">⚠️ Allergeni presenti</div>
    <div class="allergeni-grid" id="allergeni-checkboxes"></div>

    <!-- NUOVA SEZIONE INGREDIENTI -->
    <div class="campo" style="margin-top:14px">
      <label>Ingredienti completi</label>
      <textarea id="prod-ingredienti" placeholder="Es. Farina di ceci, prezzemolo, sale, olio di semi…" style="min-height:80px"></textarea>
    </div>

    <div class="campo" style="display:flex;align-items:center;gap:10px;margin-top:4px;">
      <label style="margin:0">Disponibile</label>
      <button class="toggle-disp on" id="prod-disp" onclick="this.classList.toggle('on')"></button>
    </div>
    <button class="btn-primario" onclick="salvaProdotto()">Salva prodotto</button>
    <button class="btn-elimina-modal" id="btn-elimina-prod" onclick="eliminaProdottoModal()" style="display:none">Elimina prodotto</button>
    <button class="btn-annulla" onclick="chiudiModale('modal-prodotto')">Annulla</button>
  </div>
</div>

<!-- MODALE CATEGORIA -->
<div class="modal-overlay" id="modal-categoria">
  <div class="modal-box">
    <h3 id="modal-cat-titolo">Nuova categoria</h3>
    <div class="campo"><label>Nome categoria</label><input type="text" id="cat-nome" placeholder="es. Dolci"></div>
    <div class="campo-row">
      <div class="campo"><label>Emoji</label><input type="text" id="cat-emoji" placeholder="🍰" maxlength="4"></div>
      <div class="campo"><label>Ordine</label><input type="number" id="cat-ordine" placeholder="15" min="1"></div>
    </div>
    <div class="campo">
      <label>Visibile solo in questi orari <span style="color:#aaa;font-weight:400">(lascia vuoto = sempre)</span></label>
      <div class="campo-row">
        <div class="campo" style="margin:0"><label>Dalle</label><input type="time" id="cat-ora-inizio"></div>
        <div class="campo" style="margin:0"><label>Alle</label><input type="time" id="cat-ora-fine"></div>
      </div>
    </div>
    <button class="btn-primario" onclick="salvaCategoria()">Salva categoria</button>
    <button class="btn-elimina-modal" id="btn-elimina-cat" onclick="eliminaCategoriaModal()" style="display:none">Elimina categoria</button>
    <button class="btn-annulla" onclick="chiudiModale('modal-categoria')">Annulla</button>
  </div>
</div>

<div id="anteprima-overlay">
  <button class="btn-chiudi-anteprima" onclick="chiudiAnteprima()">✕</button>
  <iframe id="anteprima-frame" src=""></iframe>
</div>
<div id="toast"></div>

<script>
const SUPABASE_URL  = 'https://cmqaujrjrhmwxfkgvrgp.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtcWF1anJqcmhtd3hma2d2cmdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MDYwNjIsImV4cCI6MjA5NzE4MjA2Mn0.JEO-R-_7B5h7FiwWOc1jRZkMwpwSk3BkYuBeq1HbsKs';
const PIN_ADMIN = '1234';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const ALLERGENI_EU = [
  {sigla:'GLU', nome:'Glutine'},
  {sigla:'CRO', nome:'Crostacei'},
  {sigla:'UOV', nome:'Uova'},
  {sigla:'PES', nome:'Pesce'},
  {sigla:'ARA', nome:'Arachidi'},
  {sigla:'SOI', nome:'Soia'},
  {sigla:'LAT', nome:'Latte'},
  {sigla:'FRU', nome:'Frutta a guscio'},
  {sigla:'SED', nome:'Sedano'},
  {sigla:'SEN', nome:'Senape'},
  {sigla:'SES', nome:'Sesamo'},
  {sigla:'SOL', nome:'Solfiti'},
  {sigla:'LUP', nome:'Lupini'},
  {sigla:'MOL', nome:'Molluschi'},
];

let categorie=[], prodotti=[], editId=null, badgeCorrente=null, fotoFile=null;

// ── PIN ──
let pinBuf='';
function pt(c){if(pinBuf.length<4){pinBuf+=c;aggPin();}if(pinBuf.length===4)setTimeout(pconf,100);}
function pcanc(){pinBuf=pinBuf.slice(0,-1);aggPin();}
function aggPin(){for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('pieno',i<pinBuf.length);}
function pconf(){
  if(pinBuf!==PIN_ADMIN){document.getElementById('login-err').textContent='PIN errato';pinBuf='';aggPin();return;}
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  costruisciCheckboxAllergeni();
  carica();
}
function logout(){document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';pinBuf='';aggPin();}

// ── ALLERGENI CHECKBOX ──
function costruisciCheckboxAllergeni(){
  document.getElementById('allergeni-checkboxes').innerHTML = ALLERGENI_EU.map(a=>`
    <label class="all-check" id="all-${a.sigla}" onclick="toggleAllCheck('${a.sigla}',this)">
      <input type="checkbox" id="chk-${a.sigla}" onclick="event.stopPropagation()">
      <span class="all-nome">${a.nome}</span>
      <span class="all-sigla">${a.sigla}</span>
    </label>`).join('');
}

function toggleAllCheck(sigla, el){
  const chk = document.getElementById('chk-'+sigla);
  chk.checked = !chk.checked;
  el.classList.toggle('sel', chk.checked);
}

function getAllergeniSelezionati(){
  return ALLERGENI_EU.filter(a=>document.getElementById('chk-'+a.sigla)?.checked).map(a=>a.sigla);
}

function setAllergeniCheckbox(arr){
  ALLERGENI_EU.forEach(a=>{
    const chk = document.getElementById('chk-'+a.sigla);
    const lbl = document.getElementById('all-'+a.sigla);
    if(chk && lbl){
      chk.checked = arr && arr.includes(a.sigla);
      lbl.classList.toggle('sel', chk.checked);
    }
  });
}

// ── CARICAMENTO ──
async function carica(){
  const[r1,r2]=await Promise.all([
    sb.from('categorie').select('*').order('ordine'),
    sb.from('prodotti').select('*').order('ordine')
  ]);
  categorie=r1.data||[];prodotti=r2.data||[];
  renderProdotti();renderCategorie();
}

// ── TAB ──
function mostraTab(nome){
  ['prodotti','categorie'].forEach(t=>document.getElementById('tab-'+t).style.display=t===nome?'block':'none');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('attivo',['prodotti','categorie'][i]===nome));
}

// ── RENDER PRODOTTI ──
function renderProdotti(){
  const div=document.getElementById('lista-prodotti');
  if(!categorie.length){div.innerHTML='<div class="empty">Nessuna categoria ancora.</div>';return;}
  let html='';
  categorie.forEach(c=>{
    const pp=prodotti.filter(p=>p.categoria_id===c.id);
    if(!pp.length)return;
    const orario=c.ora_inizio&&c.ora_fine?`${c.ora_inizio.slice(0,5)}–${c.ora_fine.slice(0,5)}`:'';
    html+=`<div class="sez-cat" id="sez-${c.id}">
      <div class="sez-cat-header">
        <span>${c.emoji}</span><h3>${c.nome}</h3>
        ${orario?`<span class="orario-tag">🕐 ${orario}</span>`:''}
        <span class="cat-count">${pp.length} prodotti</span>
      </div>
      <ul class="drag-list" id="list-${c.id}" data-cat="${c.id}">
        ${pp.map(p=>itemHTML(p,c)).join('')}
      </ul>
    </div>`;
  });
  div.innerHTML=html||'<div class="empty">Nessun prodotto ancora.</div>';
  inizializzaDrag();
}

function itemHTML(p,c){
  const orario=p.ora_inizio&&p.ora_fine?`<span class="orario-tag">🕐 ${p.ora_inizio.slice(0,5)}–${p.ora_fine.slice(0,5)}</span>`:'';
  const fotoSrc=p.foto_url?`<img src="${p.foto_url}" alt="" onerror="this.style.display='none'">`:`<span>${c.emoji}</span>`;
  const prezzoBarrato=p.prezzo_barrato?`<span class="prod-prezzo-barrato">€${Number(p.prezzo_barrato).toFixed(2)}</span>`:'';
  const allerTag=p.allergeni&&p.allergeni.length?`<span class="allergeni-tag">⚠ ${p.allergeni.join(', ')}</span>`:'';
  return `<li class="drag-item" id="prod-${p.id}" data-id="${p.id}" draggable="true">
    <span class="drag-handle" title="Trascina per riordinare">⠿</span>
    <div class="prod-foto">${fotoSrc}</div>
    <div class="prod-info">
      <div class="prod-nome">${p.nome}</div>
      <div class="prod-meta">
        <span class="prod-prezzo">€${Number(p.prezzo).toFixed(2)}</span>
        ${prezzoBarrato}
        ${p.badge==='novita'?'<span class="badge-pill badge-novita">🟢</span>':''}
        ${p.badge==='consigliato'?'<span class="badge-pill badge-consigliato">⭐</span>':''}
        ${orario}${allerTag}
        ${p.disponibile===false?'<span style="font-size:10px;color:var(--rosso);font-weight:600">NON DISP.</span>':''}
      </div>
    </div>
    <div class="prod-azioni">
      <button class="toggle-disp ${p.disponibile!==false?'on':''}" onclick="toggleDisp(${p.id},this)"></button>
      <button class="btn-ico" onclick="modificaProdotto(${p.id})">✏️</button>
    </div>
  </li>`;
}

// ── DRAG & DROP ──
let dragEl=null;
function inizializzaDrag(){
  document.querySelectorAll('.drag-item').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragEl=el;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');document.querySelectorAll('.drag-item').forEach(x=>x.classList.remove('drag-over'));dragEl=null;});
    el.addEventListener('dragover',e=>{e.preventDefault();if(dragEl&&dragEl!==el){el.classList.add('drag-over');const list=el.closest('.drag-list');const rect=el.getBoundingClientRect();if(e.clientY<rect.top+rect.height/2)list.insertBefore(dragEl,el);else list.insertBefore(dragEl,el.nextSibling);}});
    el.addEventListener('dragleave',e=>{el.classList.remove('drag-over');});
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');salvaOrdineProdotti(el.closest('.drag-list'));});
  });
  document.querySelectorAll('.drag-handle').forEach(handle=>{
    let touchEl=null,clone=null,startY=0,startX=0;
    handle.addEventListener('touchstart',e=>{touchEl=handle.closest('.drag-item');startY=e.touches[0].clientY;startX=e.touches[0].clientX;clone=touchEl.cloneNode(true);clone.style.cssText=`position:fixed;opacity:.8;pointer-events:none;z-index:9999;width:${touchEl.offsetWidth}px;top:${touchEl.getBoundingClientRect().top}px;left:${touchEl.getBoundingClientRect().left}px;`;document.body.appendChild(clone);touchEl.style.opacity='.3';},{passive:true});
    handle.addEventListener('touchmove',e=>{e.preventDefault();const dy=e.touches[0].clientY-startY,dx=e.touches[0].clientX-startX;if(clone){clone.style.transform=`translate(${dx}px,${dy}px)`;}const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);const target=el?.closest('.drag-item');if(target&&target!==touchEl){document.querySelectorAll('.drag-item').forEach(x=>x.classList.remove('drag-over'));target.classList.add('drag-over');const list=target.closest('.drag-list');const rect=target.getBoundingClientRect();if(e.touches[0].clientY<rect.top+rect.height/2)list.insertBefore(touchEl,target);else list.insertBefore(touchEl,target.nextSibling);}},{passive:false});
    handle.addEventListener('touchend',e=>{if(clone){document.body.removeChild(clone);clone=null;}if(touchEl){touchEl.style.opacity='';document.querySelectorAll('.drag-item').forEach(x=>x.classList.remove('drag-over'));salvaOrdineProdotti(touchEl.closest('.drag-list'));touchEl=null;}});
  });
}

async function salvaOrdineProdotti(list){
  const items=[...list.querySelectorAll('.drag-item')];
  await Promise.all(items.map((el,i)=>sb.from('prodotti').update({ordine:i+1}).eq('id',el.dataset.id)));
  items.forEach((el,i)=>{const p=prodotti.find(x=>x.id==el.dataset.id);if(p)p.ordine=i+1;});
  toast('Ordine salvato ✓','ok');
}

// ── RENDER CATEGORIE ──
function renderCategorie(){
  const div=document.getElementById('lista-categorie');
  div.innerHTML=`<ul class="drag-list" id="list-categorie">
    ${categorie.map(c=>{
      const orario=c.ora_inizio&&c.ora_fine?`<span class="orario-tag">🕐 ${c.ora_inizio.slice(0,5)}–${c.ora_fine.slice(0,5)}</span>`:'';
      return `<li class="cat-admin-item" id="cat-item-${c.id}" data-id="${c.id}" draggable="true">
        <span class="drag-handle">⠿</span>
        <span style="font-size:22px">${c.emoji}</span>
        <span style="flex:1;font-weight:600;font-size:14px">${c.nome}</span>
        ${orario}
        <span style="font-size:11px;color:var(--grigio)">${prodotti.filter(p=>p.categoria_id===c.id).length} prod.</span>
        <button class="btn-ico" onclick="modificaCategoria(${c.id})">✏️</button>
      </li>`;
    }).join('')}
  </ul>`;
  const list=document.getElementById('list-categorie');
  list.querySelectorAll('.cat-admin-item').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragEl=el;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');list.querySelectorAll('.cat-admin-item').forEach(x=>x.classList.remove('drag-over'));dragEl=null;});
    el.addEventListener('dragover',e=>{e.preventDefault();if(dragEl&&dragEl!==el){list.querySelectorAll('.cat-admin-item').forEach(x=>x.classList.remove('drag-over'));el.classList.add('drag-over');const rect=el.getBoundingClientRect();if(e.clientY<rect.top+rect.height/2)list.insertBefore(dragEl,el);else list.insertBefore(dragEl,el.nextSibling);}});
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');salvaOrdineCategorie();});
  });
}

async function salvaOrdineCategorie(){
  const items=[...document.querySelectorAll('.cat-admin-item')];
  await Promise.all(items.map((el,i)=>sb.from('categorie').update({ordine:i+1}).eq('id',el.dataset.id)));
  await carica();toast('Ordine categorie salvato ✓','ok');
}

// ── TOGGLE DISPONIBILITÀ ──
async function toggleDisp(id,btn){
  const p=prodotti.find(x=>x.id===id);
  const nuovo=p.disponibile===false?true:false;
  await sb.from('prodotti').update({disponibile:nuovo}).eq('id',id);
  btn.classList.toggle('on',nuovo);
  p.disponibile=nuovo;
  toast(nuovo?'Disponibile ✓':'Non disponibile','ok');
}

// ── BADGE ──
function setBadge(v){
  badgeCorrente=v;
  document.getElementById('badge-none').className='badge-opt'+(v===null?' sel-none':'');
  document.getElementById('badge-novita').className='badge-opt'+(v==='novita'?' sel-novita':'');
  document.getElementById('badge-consigliato').className='badge-opt'+(v==='consigliato'?' sel-consigliato':'');
}

// ── FOTO ──
function fotagOver(e){e.preventDefault();document.getElementById('foto-area').classList.add('dragover');}
function fotaLeave(){document.getElementById('foto-area').classList.remove('dragover');}
function fotaDrop(e){e.preventDefault();fotaLeave();const f=e.dataTransfer.files[0];if(f)processaFoto(f);}
function fotoScelto(e){const f=e.target.files[0];if(f)processaFoto(f);}
function processaFoto(f){
  if(f.size>5*1024*1024){toast('Foto troppo grande (max 5MB)','err');return;}
  fotoFile=f;
  const reader=new FileReader();
  reader.onload=ev=>{const img=document.getElementById('foto-preview');img.src=ev.target.result;img.style.display='block';document.getElementById('foto-testo').textContent='Foto pronta ✓';document.getElementById('prod-foto-url').value='';};
  reader.readAsDataURL(f);
}
async function caricaFoto(){
  if(!fotoFile)return null;
  const ext=fotoFile.name.split('.').pop();
  const nome=`prod_${Date.now()}.${ext}`;
  document.getElementById('upload-progress').style.display='block';
  document.getElementById('upload-bar').style.width='30%';
  const{data,error}=await sb.storage.from('menu-foto').upload(nome,fotoFile,{cacheControl:'3600',upsert:false});
  document.getElementById('upload-bar').style.width='100%';
  setTimeout(()=>{document.getElementById('upload-progress').style.display='none';document.getElementById('upload-bar').style.width='0%';},600);
  if(error){toast('Errore upload foto','err');return null;}
  const{data:pub}=sb.storage.from('menu-foto').getPublicUrl(nome);
  return pub.publicUrl;
}

// ── MODALE PRODOTTO ──
function apriModaleProdotto(id){
  editId=id||null;fotoFile=null;badgeCorrente=null;
  const p=id?prodotti.find(x=>x.id===id):null;
  document.getElementById('modal-prod-titolo').textContent=p?'Modifica prodotto':'Nuovo prodotto';
  document.getElementById('prod-cat').innerHTML=categorie.map(c=>`<option value="${c.id}"${p&&p.categoria_id===c.id?' selected':''}>${c.emoji} ${c.nome}</option>`).join('');
  document.getElementById('prod-nome').value=p?.nome||'';
  document.getElementById('prod-desc').value=p?.descrizione||'';
  document.getElementById('prod-prezzo').value=p?.prezzo||'';
  document.getElementById('prod-prezzo-barrato').value=p?.prezzo_barrato||'';
  document.getElementById('prod-ora-inizio').value=p?.ora_inizio?.slice(0,5)||'';
  document.getElementById('prod-ora-fine').value=p?.ora_fine?.slice(0,5)||'';
  document.getElementById('prod-foto-url').value=p?.foto_url||'';
  document.getElementById('prod-ingredienti').value=p?.ingredienti||'';
  const img=document.getElementById('foto-preview');
  if(p?.foto_url){img.src=p.foto_url;img.style.display='block';document.getElementById('foto-testo').textContent='Foto attuale';}
  else{img.style.display='none';document.getElementById('foto-testo').innerHTML='📷 <strong>Tocca per scegliere una foto</strong><br><span style="font-size:11px">JPG, PNG, WEBP · max 5MB</span>';}
  setBadge(p?.badge||null);
  setAllergeniCheckbox(p?.allergeni||[]);
  document.getElementById('prod-disp').classList.toggle('on',p?.disponibile!==false);
  document.getElementById('btn-elimina-prod').style.display=p?'block':'none';
  document.getElementById('modal-prodotto').classList.add('show');
}
function modificaProdotto(id){apriModaleProdotto(id);}

async function salvaProdotto(){
  const nome=document.getElementById('prod-nome').value.trim();
  const prezzo=parseFloat(document.getElementById('prod-prezzo').value);
  if(!nome||isNaN(prezzo)){toast('Inserisci nome e prezzo','err');return;}
  let fotoUrl=document.getElementById('prod-foto-url').value.trim()||null;
  if(fotoFile){const url=await caricaFoto();if(url)fotoUrl=url;}
  const dati={
    categoria_id:parseInt(document.getElementById('prod-cat').value),
    nome,
    descrizione:document.getElementById('prod-desc').value.trim(),
    prezzo,
    prezzo_barrato:parseFloat(document.getElementById('prod-prezzo-barrato').value)||null,
    badge:badgeCorrente,
    ora_inizio:document.getElementById('prod-ora-inizio').value||null,
    ora_fine:document.getElementById('prod-ora-fine').value||null,
    foto_url:fotoUrl,
    disponibile:document.getElementById('prod-disp').classList.contains('on'),
    allergeni:getAllergeniSelezionati(),
    ingredienti:document.getElementById('prod-ingredienti').value.trim()||null,
  };
  if(editId){await sb.from('prodotti').update(dati).eq('id',editId);toast('Prodotto aggiornato ✓','ok');}
  else{dati.ordine=prodotti.filter(p=>p.categoria_id===dati.categoria_id).length+1;await sb.from('prodotti').insert(dati);toast('Prodotto aggiunto ✓','ok');}
  chiudiModale('modal-prodotto');await carica();
}

async function eliminaProdottoModal(){
  if(!editId||!confirm('Eliminare questo prodotto?'))return;
  await sb.from('prodotti').delete().eq('id',editId);
  chiudiModale('modal-prodotto');await carica();toast('Prodotto eliminato','ok');
}

// ── MODALE CATEGORIA ──
function apriModaleCategoria(id){
  editId=id||null;
  const c=id?categorie.find(x=>x.id===id):null;
  document.getElementById('modal-cat-titolo').textContent=c?'Modifica categoria':'Nuova categoria';
  document.getElementById('cat-nome').value=c?.nome||'';
  document.getElementById('cat-emoji').value=c?.emoji||'🍽️';
  document.getElementById('cat-ordine').value=c?.ordine||(categorie.length+1);
  document.getElementById('cat-ora-inizio').value=c?.ora_inizio?.slice(0,5)||'';
  document.getElementById('cat-ora-fine').value=c?.ora_fine?.slice(0,5)||'';
  document.getElementById('btn-elimina-cat').style.display=c?'block':'none';
  document.getElementById('modal-categoria').classList.add('show');
}
function modificaCategoria(id){apriModaleCategoria(id);}
async function salvaCategoria(){
  const nome=document.getElementById('cat-nome').value.trim();
  if(!nome){toast('Inserisci il nome','err');return;}
  const dati={nome,emoji:document.getElementById('cat-emoji').value.trim()||'🍽️',ordine:parseInt(document.getElementById('cat-ordine').value)||99,attiva:true,ora_inizio:document.getElementById('cat-ora-inizio').value||null,ora_fine:document.getElementById('cat-ora-fine').value||null};
  if(editId){await sb.from('categorie').update(dati).eq('id',editId);toast('Categoria aggiornata ✓','ok');}
  else{await sb.from('categorie').insert(dati);toast('Categoria aggiunta ✓','ok');}
  chiudiModale('modal-categoria');await carica();
}
async function eliminaCategoriaModal(){
  if(!editId||!confirm('Eliminare questa categoria?'))return;
  await sb.from('categorie').delete().eq('id',editId);
  chiudiModale('modal-categoria');await carica();toast('Categoria eliminata','ok');
}

// ── ANTEPRIMA ──
function apriAnteprima(){document.getElementById('anteprima-overlay').style.display='flex';document.getElementById('anteprima-frame').src='menu.html';}
function chiudiAnteprima(){document.getElementById('anteprima-overlay').style.display='none';document.getElementById('anteprima-frame').src='';}

// ── UTILS ──
function chiudiModale(id){document.getElementById(id).classList.remove('show');editId=null;}
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)chiudiModale(m.id);}));
let toastT;
function toast(msg,tipo='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className='show '+tipo;clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);}
</script>
